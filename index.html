<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bordado — Documentos legais / Legal</title>
<style>
  :root { --bg:#FAF3EA; --fg:#3a2e22; --muted:#7a6a57; --accent:#7a5c3e; --card:#fffdf8; --line:#e7dccb; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:17px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; min-height:100vh; align-items:center; justify-content:center; }
  .card { max-width:520px; margin:24px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:28px; }
  h1 { color:var(--accent); margin:.1em 0 .3em; }
  p { color:var(--muted); }
  .links { display:flex; flex-direction:column; gap:10px; margin-top:18px; }
  a.btn { display:block; text-decoration:none; text-align:center; padding:13px 16px; border-radius:10px;
    background:var(--accent); color:#fff; font-weight:600; }
</style>
</head>
<body>
  <div class="card">
    <h1>Bordado</h1>
    <p>Documentos legais do aplicativo · App legal documents</p>
    <div class="links">
      <a class="btn" href="privacidade.html">Política de Privacidade / Privacy Policy</a>
      <a class="btn" href="termos.html">Termos de Uso / Terms of Use (EULA)</a>
    </div>
  </div>
</body>
</html>
